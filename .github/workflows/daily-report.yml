name: Daily Stock Research

on:
  schedule:
    - cron: '0 14 * * *'  # 16:00 Israel time (UTC+2)
  workflow_dispatch: 

jobs:
  run-research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langgraph langchain-openai tavily-python python-dotenv yfinance pydantic apscheduler pytz

      - name: Run the agent
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python autonomous_stock_research_agent.py
